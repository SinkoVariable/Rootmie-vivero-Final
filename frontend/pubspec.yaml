name: frontend
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1

  firebase_storage: ^13.4.3  # Para subir la foto a la nube
  image_picker: ^1.1.2      # Para abrir la galería/cámara del celular

  cupertino_icons: ^1.0.8
  firebase_core: ^4.11.0
  cloud_firestore: ^6.6.0
  firebase_auth: ^6.5.3

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo/logo_rootmie.png"
  min_sdk_android: 21

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  # 🟢 CONTEXTO DE ASSETS CORREGIDO E INDENTADO A 2 ESPACIOS
  assets:
    - assets/logo/logo_rootmie.png